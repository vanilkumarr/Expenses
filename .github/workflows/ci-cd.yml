name: Paisa Tracker CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
jobs:
  # ─── JOB 1: Test the backend ───────────────────────────────
  test:
    name: Run API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm install
      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
  # ─── JOB 2: Build Docker images ────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: paisa-tracker-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: paisa-tracker-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  # ─── JOB 3: Deploy to Render ───────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Render Deploy (Backend)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            --fail \
            --silent \
            --show-error
      - name: Trigger Render Deploy (Frontend)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" \
            --fail \
            --silent \
            --show-error
      - name: Deployment triggered
        run: echo "✅ Deploy triggered on Render — check your Render dashboard"
